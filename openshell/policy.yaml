version: 1
filesystem_policy:
  include_workdir: true
  read_only:
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /app
  - /etc
  - /var/log
  - /sys/devices/system
  read_write:
  - /sandbox
  - /PeTTa
  - /tmp
  - /dev/null
  - /opt/huggingface
  - /opt/sentence_transformers
landlock:
  compatibility: best_effort


process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  allow_cas_server_xethub_hf_co_443:
    name: allow_cas_server_xethub_hf_co_443
    endpoints:
    - host: cas-server.xethub.hf.co
      port: 443
      access: read-only
    binaries:
    - path: /usr/lib/swipl/bin/aarch64-linux/swipl
  allow_transfer_xethub_hf_co_443:
    name: allow_transfer_xethub_hf_co_443
    endpoints:
    - host: transfer.xethub.hf.co
      port: 443
      access: read-only
    binaries:
    - path: /usr/lib/swipl/bin/aarch64-linux/swipl
  allow_us_aws_cdn_hf_co_443:
    name: allow_us_aws_cdn_hf_co_443
    endpoints:
    - host: us.aws.cdn.hf.co
      port: 443
      access: read-only
    binaries:
    - path: /usr/lib/swipl/bin/aarch64-linux/swipl
  huggingface:
    name: huggingface
    endpoints:
    - host: huggingface.co
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: HEAD
          path: /**
    - host: cdn-lfs.huggingface.co
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    - host: router.huggingface.co
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/lib/swipl/bin/aarch64-linux/swipl
